  short_name: the_referendum
  title: The Referendum
  author: Pumulo Sikaneta
  description: Seven days. One vote. A fictional West African nation faces a referendum
    on a $12 billion Chinese deal that promises everything and costs everything. Twelve
    voices — a president, a farmer, a journalist, an activist, a mercenary — collide
    as a country decides its future. No heroes. No villains. No clean answer.
  genre: nonfiction
