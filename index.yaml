- author_login: pumulo
  short_name: the_last_keeper
  title: The Last Keeper
  author: Pumulo Sikaneta
  description: 'Every consequential system once had a keeper—the judge, the doctor,
    the pilot who could override the machine. The Last Keeper traces what happens
    as that human judgment is quietly removed from courts, clinics, cockpits, and
    targeting systems: the person stays in the room, but their authority is gone,
    and no one is left to hold accountable.'
  genre: nonfiction
  public: true
  outputs:
