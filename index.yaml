  short_name: the_great_convergence
  title: The Great Convergence
  author: Pumulo Sikaneta
  description: 'Three trajectories are converging: power concentrating, human judgment
    vanishing, governance crawling behind. The Great Convergence maps the chaos already
    underway across software, information, and labor—and argues we are inside a closing
    window to decide who governs the machine, before the choice is made for us.'
  genre: nonfiction
