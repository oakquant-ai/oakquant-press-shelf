  title: Of a Comb, a Prayer Book, Sugar Cubes, & Lice
  author: Shana Fogarty
  description: Of a Comb, a Prayer Book, Sugar Cubes & Lice is Shana Fogarty Shah's
    oral history of her grandmother Elizabeth Blum Goldstein, a Hungarian Jew who
    survived six concentration camps as a teenager, lost most of her family, and was
    liberated at 19 weighing 54 pounds. A witness against forgetting.
