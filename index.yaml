  short_name: who_holds_the_jar
  title: Who Holds the Jar?
  author: Pumulo Sikaneta
  description: 'From a shepherd''s counting jar to the frontier AI model, this is
    the five-thousand-year history of computation told as a story about power. Every
    prior era distributed capability as costs fell. The AI era reverses it—capability
    concentrates where the compute, data, and money are. The question that remains
    is simple: who holds the jar?'
  genre: nonfiction
  public: true
